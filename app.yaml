---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-wil42
  namespace: dev
  labels:
    app: wil42
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil42
  template:
    metadata:
      labels:
        app: wil42
    spec:
      containers:
      - name: wil42-container
        image: wil42/playground:v2
        ports:
        - containerPort: 8888

---
apiVersion: v1
kind: Service
metadata:
  name: service-wil42
  namespace: dev
spec:
  type: LoadBalancer
  selector:
    app: wil42
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888
